<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600&family=Inter:wght@400;600&family=Roboto+Condensed:wght@400;600&display=swap">
</head>
<body>

  <div class="app-wrapper">

    <!-- Top Nav -->
    <nav class="nav">
      <div class="nav-tabs">
        <button class="tab active" data-tab="today">Today</button>
        <button class="tab" data-tab="tomorrow">Tomorrow</button>
        <button class="tab" data-tab="tendays">10 Days</button>
      </div>
      <div class="search-bar">
        <input type="text" class="search-input" placeholder="Search city..." />
        <button class="search-btn" aria-label="Search">
          <img src="search-icon.png" alt="Search" />
        </button>
      </div>
    </nav>

    <!-- Main Display Card -->
    <div class="display-card">
      <div class="display-left">
        <img class="weather-icon" src="nights_stay.png" alt="Weather icon" />
        <p class="temperature">13°</p>
      </div>
      <div class="display-right">
        <h2 class="location">Los Angeles, CA, USA</h2>
        <p class="day-name">Monday</p>
        <p class="current-time">8:30 pm</p>
      </div>
    </div>

    <!-- Stats Card -->
    <div class="stats-card">

      <div class="stat-group">
        <div class="stat-item">
          <img src="sunrise.png" alt="Sunrise" class="stat-icon" />
          <div class="stat-info">
            <span class="stat-label">Sunrise</span>
            <span class="stat-value time-3">6:30 am</span>
          </div>
        </div>
        <div class="stat-item">
          <img src="sunset.png" alt="Sunset" class="stat-icon" />
          <div class="stat-info">
            <span class="stat-label">Sunset</span>
            <span class="stat-value time-2">6:00 pm</span>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="stat-group">
        <div class="stat-item">
          <img src="humidity.png" alt="Humidity" class="stat-icon" />
          <div class="stat-info">
            <span class="stat-label">Humidity</span>
            <span class="stat-value hum-per">39%</span>
          </div>
        </div>
        <div class="stat-item">
          <img src="wind-speed.png" alt="Wind Speed" class="stat-icon" />
          <div class="stat-info">
            <span class="stat-label">Wind Speed</span>
            <span class="stat-value wind-value">1.5 km/h</span>
          </div>
        </div>
      </div>

    </div>

  </div>

  <script src="index.js"></script>
</body>
</html>
